<div class="ai-page">
  <section class="input-card">
    <h2>Report Input</h2>
    <p>Drop a report file or paste report text.</p>

    <div class="drop-box">
      <span>Drop file here</span>
      <small>.txt for now</small>
    </div>

    <textarea
      placeholder="Paste report text here..."
      rows="8">
    </textarea>

    <button>Generate AI Summary</button>
  </section>

  <section class="summary-card">
    <div class="summary-header">
      <h2>AI Summary</h2>
      <span>Beta</span>
    </div>

    <div class="summary-box">
      <p>
        Your AI summary will appear here after a report is submitted.
      </p>
    </div>
  </section>
</div>
